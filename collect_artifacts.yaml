- name: Run artifact collection script on Oracle hosts
  hosts: db
  become: true
  become_user: oracle
  vars:
    oracle_sid: ORCLDB1
    listener_name: LISTENER
    artifact_dir: /tmp/oracle-artifacts
    send_email: false
    email_recipient: tushar.matthe7@gmail.com
    smtp_server: smtp.gmail.com
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    from_email: ""
    email_subject: "Oracle artifacts for {{ oracle_sid }}"
    email_body: "Please find the attached artifact bundle for Oracle SID {{ oracle_sid }}."
  tasks:
    - name: Ensure artifact destination exists
      file:
        path: "{{ artifact_dir }}"
        state: directory
        mode: '0755'

    - name: Copy artifact collection script to target host
      copy:
        src: collect_artifacts.sh
        dest: "{{ artifact_dir }}/collect_artifacts.sh"
        mode: '0755'

    - name: Run artifact collection script on target host
      command: "{{ artifact_dir }}/collect_artifacts.sh -s {{ oracle_sid }} -l {{ listener_name }} -d {{ artifact_dir }}"
      register: collect_output
      args:
        chdir: "{{ artifact_dir }}"

    - name: Show artifact script output
      debug:
        var: collect_output.stdout_lines

    - name: Find generated artifact bundle
      find:
        paths: "{{ artifact_dir }}"
        patterns: "artifact_bundle_{{ oracle_sid }}_*.tar.gz"
        file_type: file
      register: artifact_files

    - name: Fetch artifact bundle to controller
      fetch:
        src: "{{ artifact_files.files[0].path }}"
        dest: "./artifacts/"
        flat: yes
      when: artifact_files.matched > 0

    - name: Find generated HTML artifact report
      find:
        paths: "{{ artifact_dir }}"
        patterns: "artifact_summary.html"
        file_type: file
      register: html_files

    - name: Fetch HTML artifact report to controller
      fetch:
        src: "{{ html_files.files[0].path }}"
        dest: "./artifacts/"
        flat: yes
      when: html_files.matched > 0

    - name: Set artifact filename for email
      set_fact:
        artifact_filename: >-
          {{ html_files.files[0].path | basename if html_files.matched > 0 else artifact_files.files[0].path | basename }}
      when: artifact_files.matched > 0

    - name: Send artifact bundle by email
      delegate_to: localhost
      shell: >
        python3 {{ playbook_dir }}/send_artifact_email.py
        --smtp-server "{{ smtp_server }}"
        --smtp-port {{ smtp_port }}
        --smtp-user "{{ smtp_user }}"
        --smtp-password "{{ smtp_password }}"
        --from-email "{{ from_email }}"
        --to-email "{{ email_recipient }}"
        --subject "{{ email_subject }}"
        --body "{{ email_body }}"
        --attachment "{{ playbook_dir }}/artifacts/{{ artifact_filename }}"
      args:
        chdir: "{{ playbook_dir }}"
      when: send_email and artifact_files.matched > 0
